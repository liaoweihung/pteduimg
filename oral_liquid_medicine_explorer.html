<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="台灣正式口服液劑藥品查詢工具，可依配製方式、劑型、分類、適應症與有效成分篩選。">
  <title>台灣口服液劑查詢工具</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="css/oral-liquid-medicine-explorer.css?v=20260714">
</head>
<body>
  <header class="head">
    <a class="back" href="calc.html">← 返回工具首頁</a>
    <p class="eyebrow">台灣正式藥品資料</p>
    <h1>台灣口服液劑查詢工具</h1>
    <p>僅收錄可確認為口服液劑或加水配製成口服液劑的有效藥證產品；待人工確認候選不納入。</p>
  </header>

  <main>
    <section class="filters" aria-label="口服液劑查詢條件">
      <label>配製方式
        <select id="preparationFilter"><option value="">全部</option><option value="ready_to_use">開瓶可直接使用</option><option value="requires_reconstitution">需要加水配製</option></select>
      </label>
      <label>劑型
        <select id="formFilter"><option value="">全部</option><option value="syrup">糖漿</option><option value="oral_solution">口服溶液</option><option value="oral_suspension">口服懸液</option><option value="oral_drops">口服滴劑</option><option value="oral_emulsion">口服乳劑</option><option value="reconstituted_suspension">乾粉／顆粒懸液</option><option value="other">其他正式劑型</option></select>
      </label>
      <label>治療分類<select id="classFilter"><option value="">全部</option></select></label>
      <label>適應症大類<select id="indicationFilter"><option value="">全部</option></select></label>
      <label>有效成分<select id="ingredientFilter"><option value="">全部</option></select></label>
      <label class="search">關鍵字搜尋<input id="query" type="search" autocomplete="off" placeholder="商品名、藥證、成分、適應症或濃度"></label>
      <button id="clear" type="button">清除全部條件</button>
    </section>

    <section class="summary" aria-live="polite">
      <div><strong id="count">0</strong><br><span>目前產品數</span></div>
      <div id="preparationSummary">即用型 0／需配製 0</div>
      <div><strong id="activeCount">0</strong><br><span>已確認有效成分種類</span></div>
      <div><strong id="concentrationCount">0</strong><br><span>有濃度資料的產品</span></div>
      <div id="applied" class="chips"></div>
    </section>

    <section id="commonIngredients" class="insight" hidden></section>
    <section id="concentrationGroups" class="insight" hidden></section>

    <section class="list-area">
      <h2 id="listHeading">查詢結果</h2>
      <div id="list" class="list"></div>
      <nav id="pager" class="pager" aria-label="結果分頁">
        <button id="prevPage" type="button">上一頁</button><span id="pageInfo"></span><button id="nextPage" type="button">下一頁</button>
      </nav>
    </section>

    <p class="notice">濃度與用法仍應以藥品包裝及最新核准仿單為準。本工具不提供兒童劑量、體重換算或個別治療建議。</p>
  </main>
  <script src="js/oral-liquid-medicine-explorer.js?v=20260714"></script>
</body>
</html>
