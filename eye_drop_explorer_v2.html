<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eye Drop Explorer｜台灣眼科外用藥品查詢</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #17211f;
      --muted: #63706c;
      --line: #dbe4e0;
      --accent: #0f766e;
      --accent-2: #5b6f95;
      --warn: #a15c1b;
      --good: #28724f;
      --soft: #eef5f3;
      --chip: #eef1f5;
      --shadow: 0 12px 28px rgba(30, 44, 40, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
      padding-bottom: 96px;
    }
    header {
      padding: 18px 24px 12px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .subhead { color: var(--muted); margin-top: 4px; font-size: 14px; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      padding: 18px 24px;
      max-width: 1500px;
      margin: 0 auto;
    }
    aside, .result-pane {
      min-width: 0;
    }
    .control-panel {
      position: sticky;
      top: 92px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
      max-height: calc(100vh - 124px);
      overflow: auto;
    }
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    button, select, input {
      font: inherit;
    }
    .mode-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      min-height: 44px;
      color: var(--ink);
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }
    label { display: block; font-weight: 700; font-size: 13px; margin: 12px 0 6px; }
    input[type="search"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
    }
    .filter-group {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 12px;
    }
    .checks {
      display: grid;
      gap: 8px;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .check input { width: 16px; height: 16px; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .metric, .card, .chart-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .metric { padding: 13px 14px; }
    .metric b { display: block; font-size: 24px; line-height: 1.15; }
    .metric span { color: var(--muted); font-size: 13px; }
    .card { padding: 18px; margin-bottom: 14px; }
    .card h2, .card h3, .chart-card h3 { margin: 0 0 10px; font-size: 19px; }
    .card h3, .chart-card h3 { font-size: 16px; }
    .muted { color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--chip);
      color: #293631;
      font-size: 13px;
    }
    .chip.accent { background: var(--soft); color: var(--accent); font-weight: 700; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      min-width: 0;
    }
    .field .name { color: var(--muted); font-size: 12px; }
    .field .value { margin-top: 2px; word-break: break-word; }
    .chart-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .chart-card { padding: 14px; min-width: 0; }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(100px, 160px) 1fr 42px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 13px;
    }
    .bar-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #2b3835;
    }
    .bar-track {
      height: 12px;
      background: #edf1ef;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      min-width: 2px;
    }
    .bar-value { text-align: right; color: var(--muted); }
    .donut {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      margin: 10px auto;
      background: conic-gradient(var(--accent) 0 100%);
      position: relative;
    }
    .donut::after {
      content: "";
      position: absolute;
      inset: 28px;
      background: #fff;
      border-radius: 50%;
    }
    .legend { display: grid; gap: 6px; font-size: 13px; }
    .legend-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .product-list { display: grid; gap: 10px; }
    details.product {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      overflow: hidden;
    }
    details.product summary {
      cursor: pointer;
      list-style: none;
      padding: 14px;
    }
    details.product summary::-webkit-details-marker { display: none; }
    .product-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .product-title strong { font-size: 16px; }
    .product-body {
      border-top: 1px solid var(--line);
      padding: 12px 14px 14px;
      background: #fbfcfb;
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      margin-top: 8px;
      font-size: 13px;
    }
    .mini-grid div { min-width: 0; word-break: break-word; }
    .empty {
      padding: 26px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .fixed-note {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      background: #fff8ee;
      border-top: 1px solid #ead6b8;
      color: #402d16;
      padding: 11px 24px;
      font-size: 13px;
      box-shadow: 0 -8px 22px rgba(53, 38, 19, 0.08);
    }
    .source-text { max-height: 120px; overflow: auto; }
    @media (max-width: 980px) {
      header { position: static; padding: 16px; }
      main { grid-template-columns: 1fr; padding: 14px; }
      .control-panel { position: static; max-height: none; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-grid { grid-template-columns: 1fr; }
      .grid-2, .mini-grid { grid-template-columns: 1fr; }
      body { padding-bottom: 142px; }
      .fixed-note { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Eye Drop Explorer</h1>
    <div class="subhead">台灣眼藥水／眼科外用藥品互動查詢</div>
  </header>
  <main>
    <aside>
      <section class="control-panel" aria-label="查詢控制區">
        <div class="mode-grid">
          <button class="mode-btn active" data-mode="product">依商品</button>
          <button class="mode-btn" data-mode="component">依成分</button>
          <button class="mode-btn" data-mode="indication">依適應症</button>
          <button class="mode-btn" data-mode="category">依用途</button>
        </div>
        <label for="searchInput">搜尋</label>
        <input id="searchInput" type="search" placeholder="輸入商品、成分、乾眼、過敏、青光眼...">
        <label for="entitySelect">下拉選單</label>
        <select id="entitySelect"></select>
        <div class="filter-group">
          <label>藥品分類</label>
          <div id="drugChecks" class="checks"></div>
          <label for="preservativeFilter">是否含防腐劑</label>
          <select id="preservativeFilter"></select>
          <label for="dosageFilter">劑型</label>
          <select id="dosageFilter"></select>
          <label for="categoryFilter">用途分類</label>
          <select id="categoryFilter"></select>
        </div>
      </section>
    </aside>
    <section class="result-pane" aria-live="polite">
      <div id="summaryStrip" class="summary-strip"></div>
      <div id="primaryResult"></div>
      <div id="charts" class="chart-grid"></div>
      <div class="card">
        <h3>代表產品</h3>
        <div id="productList" class="product-list"></div>
      </div>
    </section>
  </main>
  <div class="fixed-note">本工具根據藥品許可證、仿單與資料表中的成分與適應症關聯整理，只能反映資料中的使用範圍。實際是否適合使用，仍需依症狀、年齡、懷孕狀態、是否配戴隱形眼鏡、眼痛／視力變化／畏光等警訊，由藥師或醫師判斷。</div>

    const stops = rows.map(([label, value], i) => {
      const start = cursor;
      const end = total ? cursor + value / total * 100 : cursor;
      cursor = end;
      return `${colors[i % colors.length]} ${start}% ${end}%`;
    }).join(",");
    const bg = total ? stops : "#edf1ef 0 100%";
    return `<div class="donut" style="background:conic-gradient(${bg})"></div><div class="legend">${rows.map(([label, value], i) => `<div class="legend-item"><span><span class="dot" style="background:${colors[i % colors.length]}"></span>${escapeHtml(label)}</span><b>${value}</b></div>`).join("")}</div>`;
  }
  function renderProducts(products) {
    const rows = selectedProducts(products).slice(0, 80);
    $("productList").innerHTML = rows.length ? rows.map(productCard).join("") : `<div class="empty">沒有符合條件的代表產品。</div>`;
  }
  function productCard(p) {
    return `<details class="product"><summary><div class="product-title"><div><strong>${escapeHtml(p.name)}</strong><div class="muted">${escapeHtml(p.englishName)}</div></div><span class="chip">${escapeHtml(p.drugClass)}</span></div>
      <div class="mini-grid">
        <div><b>許可證</b> ${escapeHtml(p.license)}</div><div><b>劑型</b> ${escapeHtml(p.dosageForm)}</div>
        <div><b>規格</b> ${escapeHtml(p.spec || "未列出")}</div><div><b>用途</b> ${escapeHtml(p.usageCategory)}</div>
        <div><b>防腐劑</b> ${escapeHtml(p.preservativeStatus)}</div><div><b>主要成分</b> ${escapeHtml(p.components.join("；") || "待確認")}</div>
        <div><b>適應症摘要</b> ${escapeHtml(p.indicationSummary.join("；") || "待確認")}</div>
      </div></summary><div class="product-body">
        ${field("完整適應症", p.indicationFull)}${field("完整成分", p.ingredientFull)}${field("許可證持有廠商", p.holder)}${field("備註", p.note || "無")}${field("資料來源", p.source)}
      </div></details>`;
  }
  function render() {
    let products = filteredProducts();
    products = selectedProducts(products);
    if (state.mode === "component" && state.selected) products = APP_DATA.products.filter(p => p.components.includes(state.selected) && productMatchesFilters(p));
    if (state.mode === "indication" && state.selected) products = APP_DATA.products.filter(p => p.indicationSummary.includes(state.selected) && productMatchesFilters(p));
    if (state.mode === "category" && state.selected) products = APP_DATA.products.filter(p => p.usageCategory === state.selected && productMatchesFilters(p));
    renderSummary(products);
    $("primaryResult").innerHTML = renderPrimary(products);
    renderCharts(products);
    renderProducts(products);
  }
  hydrateControls();
  render();
  </script>
</body>
</html>
