name: Card popularity report

on:
  workflow_dispatch:
  schedule:
    # 04:05 Asia/Taipei. GitHub Actions may start a few minutes late.
    - cron: "5 20 * * *"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install google-analytics-data google-auth

      - name: Generate report
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python scripts/ga_card_popularity_report.py

      - name: Add report to workflow summary
        run: cat reports/card-popularity.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/card-popularity.md reports/card-popularity.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update card popularity report"
            git push
          fi
