<!doctype html>
<html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>台灣肛門與陰道塞劑查詢工具</title><meta name="description" content="依 TFDA 官方許可證結構化資料整理的肛門／直腸與陰道固體塞劑查詢工具。"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.png"><link rel="stylesheet" href="css/suppository-medicine-explorer.css?v=20260714"></head>
<body><header class="head"><a class="back" href="calc.html">← 返回工具</a><h1>台灣肛門與陰道塞劑查詢工具</h1><p>收錄具台灣藥品許可證的肛門／直腸與陰道固體置入製劑；人工確認候選不納入結果。</p></header>
<main><section class="filters" aria-label="查詢條件"><label>使用部位<select id="site"><option value="">全部</option><option value="rectal">肛門／直腸</option><option value="vaginal">陰道</option></select></label><label>作用範圍<select id="scope"><option value="">全部</option><option value="local">局部作用</option><option value="systemic">全身作用</option><option value="unclear">作用範圍待確認</option></select></label><label>治療分類<select id="class"><option value="">全部</option></select></label><label>適應症大類<select id="indication"><option value="">全部</option></select></label><label>有效成分<select id="ingredient"><option value="">全部</option></select></label><label class="search">關鍵字搜尋<input id="query" type="search" placeholder="商品名、藥證、成分或適應症"></label><button id="clear" type="button">清除全部條件</button></section>
<section class="summary" aria-live="polite"><div><strong id="count">0</strong><br><span>符合產品</span></div><div id="sites"></div><div id="scopes"></div><div><strong id="actives">0</strong><br><span>已確認有效成分種類</span></div><div><span id="applied" class="chips"></span></div></section><section id="common" class="common" hidden></section><section id="list" class="list"></section><p class="notice">本工具僅供資料查詢，不能取代核准仿單、藥師、醫師或其他醫療專業人員的判斷。</p></main><script src="js/suppository-medicine-explorer.js?v=20260714"></script></body></html>
