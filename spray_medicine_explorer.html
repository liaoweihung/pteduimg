<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>台灣局部鼻腔與口咽噴劑查詢工具</title><meta name="description" content="依 TFDA 正式資料整理的台灣局部鼻腔、咽喉與口腔黏膜噴劑查詢工具。"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.png"><link rel="stylesheet" href="css/spray-medicine-explorer.css?v=20260714"></head><body><header class="head"><a class="back" href="calc.html">← 返回工具首頁</a><h1>台灣局部鼻腔與口咽噴劑查詢工具</h1><p>僅收錄具台灣藥品許可證、可確認為局部鼻腔／口咽使用的正式產品。</p></header><main><section class="filters" aria-label="查詢條件"><label>使用部位<select id="site"><option value="">全部</option><option value="nasal">鼻腔</option><option value="throat">咽喉</option><option value="oral_mucosal">口腔黏膜</option></select></label><label>治療分類<select id="class"><option value="">全部</option></select></label><label>適應症大類<select id="indication"><option value="">全部</option></select></label><label>有效成分<select id="ingredient"><option value="">全部</option></select></label><label class="search">關鍵字搜尋<input id="query" type="search" placeholder="商品名、藥證、成分或適應症"></label><button id="clear" class="clear" type="button">清除全部條件</button></section><section class="summary" aria-live="polite"><div><strong id="count">0</strong><br><span class="muted">目前符合產品</span></div><div><strong id="sites">—</strong><br><span class="muted">使用部位分布</span></div><div><strong id="actives">0</strong><br><span class="muted">已確認有效成分種類</span></div><div><span id="applied" class="chips"></span></div></section><section id="common" class="common" hidden></section><section id="list" class="list"></section><p class="notice">資料僅供查詢，不能取代最新核准仿單、醫師或藥師的專業判斷。未能確認使用部位的產品、肺部吸入劑及皮膚噴劑均未納入。</p></main><script src="js/spray-medicine-explorer.js?v=20260714"></script></body></html>
